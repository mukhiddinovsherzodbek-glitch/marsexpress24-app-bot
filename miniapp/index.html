<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <title>Marsexpress24</title>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts: Inter (minimal, geometric, multi-language) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- =================================================================
         Header (sticky on top — logo + cart)
         ================================================================= -->
    <header class="app-header">
        <div class="brand">
            <span class="brand__name">Marsexpress24</span>
            <span class="brand__hello">Buyurtmangizni tanlang 🍔</span>
        </div>
        <button class="cart-icon" id="cart-icon" aria-label="Savat">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path>
            </svg>
            <span class="cart-icon__badge" id="cart-badge" hidden>0</span>
        </button>
    </header>

    <!-- Working-hours banner — toggled by app.js when /api/status reports closed -->
    <div class="closed-banner" id="closed-banner" hidden>
        <span>⏰</span>
        <span>Hozir ishlamayapmiz. Ish vaqtimiz: <b id="closed-banner-hours">10:00 - 03:00</b></span>
    </div>

    <!-- =================================================================
         Main content — pages swap inside #main
         ================================================================= -->
    <main id="main">
        <!-- PAGE: Home -->
        <section class="page page--active" id="page-home">

            <!-- VIEW: Categories grid -->
            <div class="view view--active" id="view-categories">
                <h1 class="page-title">Kategoriyalar</h1>
                <div class="categories-grid" id="categories-grid">
                    <!-- Initial skeletons (replaced when API responds) -->
                    <div class="cat-card cat-card--skeleton">
                        <div class="skeleton skeleton--img"></div>
                        <div class="skeleton skeleton--text" style="width: 60%"></div>
                    </div>
                    <div class="cat-card cat-card--skeleton">
                        <div class="skeleton skeleton--img"></div>
                        <div class="skeleton skeleton--text" style="width: 70%"></div>
                    </div>
                    <div class="cat-card cat-card--skeleton">
                        <div class="skeleton skeleton--img"></div>
                        <div class="skeleton skeleton--text" style="width: 50%"></div>
                    </div>
                    <div class="cat-card cat-card--skeleton">
                        <div class="skeleton skeleton--img"></div>
                        <div class="skeleton skeleton--text" style="width: 80%"></div>
                    </div>
                </div>
            </div>

            <!-- VIEW: Products of a chosen category -->
            <div class="view" id="view-products">
                <div class="view-header">
                    <button class="back-btn" id="back-to-categories" aria-label="Orqaga">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                             stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2 class="view-title" id="products-title">Mahsulotlar</h2>
                </div>
                <div class="products-list" id="products-list">
                    <!-- skeletons injected by app.js when loading -->
                </div>
            </div>

        </section>

        <!-- PAGE: My Orders -->
        <section class="page" id="page-orders">
            <h1 class="page-title">Mening buyurtmalarim</h1>
            <div class="orders-list" id="orders-list">
                <!-- rendered by app.js -->
            </div>
        </section>
    </main>

    <!-- =================================================================
         Bottom navigation (fixed at the bottom of the viewport)
         ================================================================= -->
    <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-btn nav-btn--active" data-page="home" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Bosh sahifa</span>
        </button>
        <button class="nav-btn" data-page="orders" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="9" y1="13" x2="15" y2="13"></line>
                <line x1="9" y1="17" x2="15" y2="17"></line>
            </svg>
            <span>Mening buyurtmalarim</span>
        </button>
    </nav>

    <!-- =================================================================
         CART — modal overlay (page does not change underneath)
         ================================================================= -->
    <div class="overlay" id="cart-overlay" aria-hidden="true">
        <div class="overlay__backdrop" data-close="cart"></div>
        <div class="overlay__sheet">
            <header class="overlay__header">
                <h2 class="overlay__title">Savat</h2>
                <button class="overlay__close" data-close="cart" aria-label="Yopish">×</button>
            </header>
            <div class="overlay__body">
                <div class="cart-items" id="cart-items">
                    <!-- rendered by cart.js -->
                </div>
                <div class="cart-empty" id="cart-empty">
                    <p>Savatingiz bo'sh</p>
                    <span>Bosh sahifaga qaytib mahsulot tanlang</span>
                </div>
            </div>
            <footer class="overlay__footer" id="cart-footer">
                <div class="cart-total-row">
                    <span class="cart-total-label">JAMI:</span>
                    <span class="cart-total-value" id="cart-total">0 so'm</span>
                </div>
                <button class="btn btn--primary" id="open-checkout" type="button">
                    Buyurtmani rasmiylashtirish
                </button>
                <p class="min-order-warn" id="min-order-warn" hidden></p>
            </footer>
        </div>
    </div>

    <!-- =================================================================
         CHECKOUT — modal overlay
         ================================================================= -->
    <div class="overlay" id="checkout-overlay" aria-hidden="true">
        <div class="overlay__backdrop" data-close="checkout"></div>
        <div class="overlay__sheet">
            <header class="overlay__header">
                <h2 class="overlay__title">Rasmiylashtirish</h2>
                <button class="overlay__close" data-close="checkout" aria-label="Yopish">×</button>
            </header>
            <form class="overlay__body checkout-form" id="checkout-form" novalidate>

                <label class="field">
                    <span class="field__label">Ismingiz</span>
                    <input
                        class="field__input"
                        type="text"
                        name="customer_name"
                        id="f-name"
                        placeholder="Sizning ismingiz"
                        autocomplete="name"
                        required
                    />
                </label>

                <label class="field">
                    <span class="field__label">Telefon raqami</span>
                    <input
                        class="field__input"
                        type="tel"
                        name="customer_phone"
                        id="f-phone"
                        placeholder="+998 (90) 123-45-67"
                        inputmode="tel"
                        autocomplete="tel"
                        required
                    />
                    <span class="field__hint" id="phone-hint" hidden></span>
                </label>

                <div class="field">
                    <span class="field__label">Manzil</span>

                    <button class="btn btn--ghost" type="button" id="loc-btn">
                        <span id="loc-btn-label">📍 Joylashuvni avtomatik yuborish</span>
                    </button>
                    <span class="field__hint field__hint--ok" id="loc-status" hidden></span>

                    <textarea
                        class="field__input field__input--area"
                        name="address_text"
                        id="f-address"
                        rows="3"
                        placeholder="Masalan: Chilonzor tumani, 7-mavze, 15-uy"
                    ></textarea>
                    <span class="field__hint field__hint--err" id="address-hint" hidden></span>
                </div>

                <label class="field">
                    <span class="field__label">💬 Izoh (ixtiyoriy)</span>
                    <textarea
                        class="field__input field__input--area"
                        name="comment"
                        id="f-comment"
                        rows="2"
                        placeholder="Izoh"
                        maxlength="500"
                    ></textarea>
                </label>

                <div class="delivery-info" id="delivery-info" hidden></div>

                <div class="checkout-total-rows">
                    <div class="checkout-row">
                        <span>Mahsulotlar:</span>
                        <span id="checkout-subtotal">0 so'm</span>
                    </div>
                    <div class="checkout-row" id="checkout-delivery-row" hidden>
                        <span>Dostavka:</span>
                        <span id="checkout-delivery">Bepul</span>
                    </div>
                    <div class="checkout-total">
                        <span>JAMI:</span>
                        <strong id="checkout-total">0 so'm</strong>
                    </div>
                </div>

                <p class="min-order-warn" id="checkout-min-warn" hidden></p>

                <button class="btn btn--primary" type="submit" id="confirm-btn" disabled>
                    ✅ Buyurtmani tasdiqlash
                </button>
            </form>
        </div>
    </div>

    <!-- =================================================================
         Toast (transient messages — error / info)
         ================================================================= -->
    <div class="toast" id="toast" hidden></div>

    <!-- =================================================================
         HTML templates — cloned by JS at render time
         ================================================================= -->
    <template id="tpl-category-card">
        <button class="cat-card" type="button">
            <div class="cat-card__img-wrap">
                <img class="cat-card__img" alt="" />
            </div>
            <span class="cat-card__name"></span>
        </button>
    </template>

    <template id="tpl-product-card">
        <article class="prod-card">
            <div class="prod-card__img-wrap">
                <img class="prod-card__img" alt="" loading="lazy" />
            </div>
            <div class="prod-card__body">
                <h3 class="prod-card__name"></h3>
                <p class="prod-card__desc" hidden></p>
                <div class="prod-card__price"></div>
                <div class="prod-card__action">
                    <!-- Filled by app.js: either "+ Savatga qo'shish" or "- N +" -->
                </div>
            </div>
        </article>
    </template>

    <template id="tpl-cart-item">
        <div class="cart-item">
            <img class="cart-item__img" alt="" />
            <div class="cart-item__body">
                <div class="cart-item__name"></div>
                <div class="cart-item__price"></div>
                <div class="cart-item__qty">
                    <button class="qty-btn" data-action="dec" type="button" aria-label="Kamaytirish">−</button>
                    <span class="qty-val">1</span>
                    <button class="qty-btn" data-action="inc" type="button" aria-label="Oshirish">+</button>
                </div>
            </div>
            <button class="cart-item__remove" data-action="remove" type="button" aria-label="O'chirish">×</button>
        </div>
    </template>

    <template id="tpl-order-card">
        <article class="order-card">
            <header class="order-card__head">
                <span class="order-card__id">#</span>
                <span class="order-card__date"></span>
            </header>
            <div class="order-card__items"></div>
            <footer class="order-card__foot">
                <span class="order-card__status"></span>
                <span class="order-card__total"></span>
            </footer>
            <button class="btn btn--ghost btn--block order-card__reorder" type="button">
                🔁 Yana shundan buyurtma qilish
            </button>
        </article>
    </template>

    <template id="tpl-skeleton-product">
        <div class="prod-card prod-card--skeleton">
            <div class="skeleton skeleton--img"></div>
            <div class="prod-card__body">
                <div class="skeleton skeleton--text" style="width: 70%"></div>
                <div class="skeleton skeleton--text" style="width: 40%; height: 18px; margin-top: 6px"></div>
                <div class="skeleton skeleton--btn" style="margin-top: 12px"></div>
            </div>
        </div>
    </template>

    <!-- =================================================================
         App scripts (load order matters — api → cart → app)
         ================================================================= -->
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
