# =========================================================================
# Marsexpress24 — keep-alive cron
#
# Render free Web Services suspend after 15 minutes of inactivity. When
# that happens, the next Telegram webhook delivery gets a 404 from
# Render's edge and the bot looks broken until somebody opens the Mini
# App. This workflow pings /healthz every 10 minutes so the service
# never sleeps in the first place.
#
# GitHub Actions free tier covers this easily (~144 runs/day, each
# ~30 seconds = ~70 minutes/day; private-repo allowance is 2000 min/mo).
# =========================================================================

name: keep-alive

on:
  schedule:
    # Every 10 minutes. The cron syntax here is UTC.
    - cron: '*/10 * * * *'
  workflow_dispatch:    # so you can run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render healthz
        env:
          RENDER_URL: https://marsexpress24-bot.onrender.com/healthz
        run: |
          set -euo pipefail
          # Retry up to 3 times to give a sleeping service time to wake.
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}…"
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 60 "$RENDER_URL" || true)
            echo "HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "✓ awake"
              cat /tmp/body
              exit 0
            fi
            sleep 15
          done
          echo "Service unreachable after 3 attempts"
          cat /tmp/body || true
          exit 1
