# =========================================================================
# Marsexpress24 — auto-deploy to Render on push
#
# The Render service was created from a public Git URL, so Render doesn't
# receive GitHub push webhooks on its own. This workflow closes that gap:
# every push to main calls Render's Deploy Hook, which rebuilds + redeploys
# the latest commit.
#
# The hook URL only triggers a deploy (it can't read code or data). It's
# kept in a repo secret RENDER_DEPLOY_HOOK so it isn't exposed even if the
# repo is made public. Falls back to nothing if the secret is unset.
# =========================================================================

name: deploy-to-render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set — skipping."
            exit 0
          fi
          code=$(curl -s -X POST -o /tmp/resp -w "%{http_code}" "${HOOK}")
          echo "Render responded HTTP ${code}"
          cat /tmp/resp || true
          test "${code}" = "200"
